services:
  postgres:
    image: postgres:16
    container_name: resume_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: resume_redis
    restart: unless-stopped
    networks:
      - resume_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend-api
    container_name: resume_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - resume_network
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend-api
    container_name: resume_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-api:
        condition: service_started
    networks:
      - resume_network
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    container_name: resume_frontend
    restart: unless-stopped
    networks:
      - resume_network

  nginx:
    image: nginx:1.27
    container_name: resume_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api
      - frontend
    networks:
      - resume_network

  minio:
    image: minio/minio:latest
    container_name: resume_minio
    restart: unless-stopped
    profiles:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - resume_network

  ollama:
    image: ollama/ollama:latest
    container_name: resume_ollama
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - resume_network

volumes:
  postgres_data:
  minio_data:
  ollama_data:

networks:
  resume_network:
    driver: bridge
